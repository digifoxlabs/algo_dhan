<!DOCTYPE html>
<html>
<head>
    <title>Dhan Trading Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">Dhan API Dashboard</h2>

    <div style="font-size: 20px; font-weight: bold; margin-bottom: 15px;">
    Welcome, {{ name }}
</div>

    <!-- P&L Panel -->
    <div class="card bg-primary p-3 mb-4">
        <h4>Real-Time P&L Summary</h4>
        <h5>Open P&L: ₹ <span id="openPnl">0</span></h5>
        <h5>Realized P&L: ₹ <span id="realizedPnl">0</span></h5>
        <h3>Total P&L: ₹ <span id="totalPnl">0</span></h3>
    </div>

    <!-- Kill Switch Panel -->
    <div class="card bg-danger p-3 mb-4">
        <h4>Kill Switch Control</h4>
        <p>Status: <strong id="killStatus">Checking...</strong></p>

        <button class="btn btn-dark me-2" onclick="checkKillStatus()">Refresh</button>
        <button class="btn btn-warning me-2" onclick="activateKill()">Activate</button>
        <button class="btn btn-success" onclick="deactivateKill()">Deactivate</button>
    </div>

    <!-- Data Tabs -->
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <button class="nav-link active" onclick="loadOrders()">Orders</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="loadTrades()">Trades</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="loadPositions()">Positions</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="loadHoldings()">Holdings</button>
        </li>
    </ul>

    <div class="card bg-secondary mt-3 p-3">
        <pre id="output" style="white-space: pre-wrap;"></pre>
    </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
